<!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Zeph Suderman - Home</title>
</head>
<script>
    function myFunction() {
      var x = document.getElementById("myTopnav");
      if (x.className === "topnav") {
        x.className += " responsive";
      } else {
        x.className = "topnav";
      }
    }
</script>
<style>body, h1, h2, h3, p {
    margin: 0;
    padding: 0;
}

h3 {
    color: #c5770a;
    padding-top: 20px;
}

.hero {
    text-align: center;
    padding: 150px 0;
    background-color: #f4f4f4;
}

.about {
    padding: 50px;
}

.about-bubble {
    padding: 20px;
    background-color: whitesmoke;
    border-radius: 10px;
}

.projects {
    padding-left: 50px;
    padding-right: 50px;
    padding-bottom: 50px;
}

.project {
    margin-bottom: 20px;
    padding-left: 20px;
    padding-bottom: 20px;
    background-color: #40a2e9;
    border-radius: 30px;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.topnav {
  overflow: hidden;
  background-color: #333;
}
.topnav b {
    float: left;
    color: #f2f2f2;
    padding: 14px 16px;
    text-decoration: none;
    font-size: 17px;
    text-decoration: none;
    font-size: 17px;
}

.topnav a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}

.topnav a.active {
  background-color: #0c6db2;
  color: white;
}

.topnav .icon {
  display: none;
}

.topnav-right {
    float: right;
}

@media screen and (max-width: 600px) {
  .topnav a{display: none;}
  .topnav a.icon {
    float: right;
    display: block;
  }
}

@media screen and (max-width: 600px) {
  .topnav.responsive {position: relative;}
  .topnav.responsive .icon {
    position: relative;
    text-align: right;
  }
  .topnav.responsive a {
    float: none;
    display: block;
    text-align: left;
  }
}</style>
<body>
    <div class="topnav">
        <b href="./" class="logo">Zeph Suderman</b>
        <div class="topnav-right">
            <div class="topnav" id="myTopnav">
                <a href="javascript:void(0);" class="icon" onclick="myFunction()">
                    <i class="fa fa-code"></i>
                </a>
                <a href="./"class="active">Home</a>
                <a href="./about">About Me</a>
                <a href="./projects">Projects</a>
            </div>
        </div>
    </div>
    <section class="hero">
        <h1>Zeph Suderman</h1>
        <p>Showcasing my work and projects.</p>
    </section>
    <section class="hero">
        
    </section>
</body>
</html>
