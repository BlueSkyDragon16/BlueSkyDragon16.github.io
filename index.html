<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Zeph Suderman - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">    
    <style>
        body {
            /* Set the gradient background */
            background: linear-gradient(135deg, rgb(46, 46, 242), rgb(6, 210, 6));
            
            /* Set some additional styles to make it look better */
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden; /* Prevent horizontal scrollbar */
        
        }

        h1 {
            font-family: cursive; /* Apply the handwritten font */
            color: rgb(255, 255, 255);
            font-family: Arial, sans-serif;
            text-align: center;
            font-size: 50px ;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* Add a white glow */
            z-index: 1;
        }

        p {
            font-size: 20px;
            margin: 30px;
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 10px;
        }

        li {
            margin: 0 20px;
            font-size: 40px;
        }

        a {
            text-decoration: none;
            color: rgb(255, 255, 255); /* Set your preferred color */
        }
